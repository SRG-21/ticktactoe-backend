user nginx;
worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:5m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:5m rate=5r/s;

    # Upstream servers
    upstream go_sockets {
        server go-sockets:8080;
    }

    upstream node_api {
        server node-api:3000;
    }

    # HTTP - redirect to HTTPS
    server {
        listen 80;
        server_name ticktactoe-api.sankalpai.dev;

        # ACME challenge for cert renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name ticktactoe-api.sankalpai.dev;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/ticktactoe-api.sankalpai.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ticktactoe-api.sankalpai.dev/privkey.pem;

        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Health check endpoint
        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # WebSocket endpoint
        location /ws {
            limit_req zone=ws_limit burst=10 nodelay;

            proxy_pass http://go_sockets;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket timeouts
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }

        # Go WebSocket health
        location /go-health {
            proxy_pass http://go_sockets/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # REST API endpoints
        location /api {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://node_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Node API health (direct)
        location /node-health {
            proxy_pass http://node_api/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Catch-all
        location / {
            return 200 "TicTacToe Backend API (HTTPS)\n\nEndpoints:\n  /ws - WebSocket (wss://)\n  /api/* - REST API\n  /health - nginx health\n";
            add_header Content-Type text/plain;
        }
    }
}
