name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PATH: /home/ubuntu/ticktactoe-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ~/ticktactoe-backend
            
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            
            echo "🐳 Rebuilding containers..."
            cd infra
            sudo docker compose -f docker-compose.oracle.yml build --no-cache
            
            echo "🔄 Restarting services..."
            sudo docker compose -f docker-compose.oracle.yml up -d --force-recreate
            
            echo "⏳ Waiting for services to be healthy..."
            sleep 10
            
            echo "🧹 Cleaning up old images..."
            sudo docker image prune -f
            
            echo "✅ Deployment complete!"
            sudo docker ps
          EOF

      - name: Health check
        run: |
          sleep 15
          echo "Checking health endpoints..."
          curl -sf http://${{ secrets.SSH_HOST }}/health || exit 1
          curl -sf http://${{ secrets.SSH_HOST }}/go-health || exit 1
          curl -sf http://${{ secrets.SSH_HOST }}/node-health || exit 1
          echo "✅ All services healthy!"

      - name: Deployment summary
        if: always()
        run: |
          echo "### Deployment ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
